!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>질량 보존 법칙 가상 실험실</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
/* ─── RESET & ROOT ───────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F0F4FB;
  --panel:#FFFFFF;
  --border:#DDE4F0;
  --blue:#1A6EE8;
  --blue-lt:#EBF2FF;
  --teal:#0D9488;
  --teal-lt:#CCFBF1;
  --grn:#16A34A;
  --grn-lt:#DCFCE7;
  --ora:#EA580C;
  --ora-lt:#FFF1EC;
  --red:#DC2626;
  --amber:#D97706;
  --amber-lt:#FFFBEB;
  --text:#1E293B;
  --muted:#64748B;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  /* atom palette */
  --Na:#FDE68A; --Na-t:#78350F; --Na-s:#F59E0B;
  --CO3:#93C5FD; --CO3-t:#1E3A8A; --CO3-s:#3B82F6;
  --Ca:#6EE7B7; --Ca-t:#064E3B; --Ca-s:#059669;
  --Cl:#DDD6FE; --Cl-t:#4C1D95; --Cl-s:#7C3AED;
  --PPT:#F1F5F9; --PPT-t:#475569; --PPT-s:#94A3B8;
  --NaHCO3:#BBF7D0; --NaHCO3-t:#14532D; --NaHCO3-s:#22C55E;
  --AcOH:#FEF08A; --AcOH-t:#713F12; --AcOH-s:#EAB308;
  --CO2:#E2E8F0; --CO2-t:#475569; --CO2-s:#94A3B8;
  --Prod:#FED7AA; --Prod-t:#7C2D12; --Prod-s:#F97316;
  --H2O:#BAE6FD; --H2O-t:#0C4A6E; --H2O-s:#0EA5E9;
}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:'Noto Sans KR',sans-serif;background:var(--bg);
  display:flex;flex-direction:column;user-select:none;touch-action:none;}

/* ─── HEADER ──────────────────────────────────────────────────── */
#hdr{
  flex-shrink:0;height:52px;
  background:var(--panel);border-bottom:2px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  box-shadow:var(--shadow);
}
#hdr h1{font-size:clamp(13px,2vw,17px);font-weight:900;color:var(--text);}
#hdr small{font-size:11px;color:var(--muted);}
.rx-tabs{display:flex;gap:6px;margin-left:auto;}
.rx-tab{
  padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);
  background:transparent;font-size:12px;font-weight:700;cursor:pointer;
  color:var(--muted);font-family:inherit;transition:all .2s;white-space:nowrap;
}
.rx-tab.on{background:var(--blue);border-color:var(--blue);color:#fff;}

/* ─── MAIN GRID ───────────────────────────────────────────────── */
#main{
  flex:1;min-height:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr auto;
  gap:10px;padding:10px;
}
@media(max-width:600px){
  #main{grid-template-columns:1fr;grid-template-rows:auto auto auto;}
}

/* ─── LAB PANEL (left) ────────────────────────────────────────── */
#lab-panel{
  grid-row:1/3;
  background:var(--panel);border-radius:16px;
  border:1.5px solid var(--border);box-shadow:var(--shadow);
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}
@media(max-width:600px){#lab-panel{grid-row:auto;}}

.lab-top{
  flex-shrink:0;padding:10px 14px 8px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.lab-top h2{font-size:13px;font-weight:700;color:var(--text);}

/* BEAKERS ZONE */
#beaker-zone{
  flex-shrink:0;
  display:flex;align-items:flex-end;justify-content:center;
  gap:clamp(8px,3vw,24px);
  padding:12px 16px 8px;
  background:linear-gradient(180deg,#F8FAFF 0%,#F0F4FB 100%);
  border-bottom:2px solid var(--border);
  position:relative;min-height:130px;
}
/* beaker SVG wrapper */
.bk-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .15s;}
.bk-wrap:active{transform:scale(.95);}
.bk-wrap.disabled{cursor:default;opacity:.45;pointer-events:none;}
.bk-label{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--muted);}

/* MIX ARROW */
#mix-arrow{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  align-self:center;flex-shrink:0;
}
#mix-btn{
  width:48px;height:48px;border-radius:50%;
  background:var(--teal);color:#fff;border:none;
  font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(13,148,136,.35);transition:all .2s;font-family:inherit;
}
#mix-btn:active{transform:scale(.9);}
#mix-btn:disabled{background:#CBD5E1;box-shadow:none;cursor:default;}
#mix-lbl{font-size:9px;font-weight:700;color:var(--muted);}

/* SCALE */
#scale-wrap{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  align-self:flex-end;flex-shrink:0;
}
.scale-screen{
  background:#0F172A;border-radius:8px;padding:4px 12px;
  font-family:'Space Mono',monospace;font-size:clamp(16px,3vw,22px);
  font-weight:700;color:#4ADE80;letter-spacing:1px;
  border:2px solid #1E293B;min-width:100px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.scale-beam{width:100px;height:6px;border-radius:3px;background:#94A3B8;
  transform-origin:center;transition:transform .6s cubic-bezier(.34,1.56,.64,1);}
.scale-beam.ok{background:#4ADE80;box-shadow:0 0 10px rgba(74,222,128,.5);}
.scale-post{width:6px;height:16px;background:#64748B;border-radius:2px;}
.scale-base{width:46px;height:5px;background:#475569;border-radius:3px;}
.scale-lbl{font-size:9px;color:var(--muted);font-weight:700;}

/* CANVAS */
#canvas-wrap{
  flex:1;min-height:0;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#F8FBFF 0%,#EDF2FB 100%);
}
#pcanvas{display:block;width:100%;height:100%;}
.canvas-msg{
  position:absolute;top:6px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.9);border-radius:20px;
  padding:3px 12px;font-size:11px;font-weight:700;color:var(--muted);
  white-space:nowrap;pointer-events:none;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
}
.phase-badge{
  position:absolute;bottom:8px;right:10px;
  border-radius:12px;padding:3px 10px;
  font-size:10px;font-weight:700;
  background:rgba(255,255,255,.9);
}
.phase-badge.sep{color:var(--muted);}
.phase-badge.mix{color:var(--blue);}
.phase-badge.react{color:var(--ora);}
.phase-badge.done{color:var(--grn);}

/* LEGEND */
#legend{
  flex-shrink:0;padding:8px 14px;
  display:flex;flex-wrap:wrap;gap:7px;
  border-top:2px solid var(--border);
  background:var(--panel);
}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text);
  background:#F8FAFF;border-radius:20px;padding:4px 10px;border:1px solid var(--border);}
.leg-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(0,0,0,.15);box-shadow:inset 0 -2px 4px rgba(0,0,0,.12);}

/* ─── RIGHT PANELS ────────────────────────────────────────────── */
#eq-panel{
  background:var(--panel);border-radius:16px;
  border:1.5px solid var(--border);box-shadow:var(--shadow);
  padding:12px 14px;display:flex;flex-direction:column;gap:8px;
}
#result-panel{
  background:var(--panel);border-radius:16px;
  border:1.5px solid var(--border);box-shadow:var(--shadow);
  padding:10px 14px;display:flex;flex-direction:column;gap:6px;
}
@media(max-width:600px){#eq-panel,#result-panel{grid-column:auto;}}

.panel-title{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}
.panel-title::before{content:'';display:inline-block;width:3px;height:13px;background:var(--blue);border-radius:2px;}

/* EQ ROW */
.eq-row{
  display:flex;flex-wrap:wrap;align-items:center;gap:5px;
  justify-content:center;padding:8px 6px;border-radius:10px;
  background:var(--blue-lt);border:1.5px solid #C7D9FF;
}
.eq-unit{display:flex;align-items:center;gap:4px;}
.eq-mol{
  font-family:'Space Mono',monospace;font-size:clamp(12px,2vw,15px);
  font-weight:700;color:var(--text);
}
.eq-state{font-size:11px;vertical-align:super;font-weight:900;}
.eq-state.ppt{color:var(--blue);}
.eq-state.gas{color:var(--ora);}
.eq-plus{font-size:16px;font-weight:900;color:#94A3B8;}
.eq-arr{font-size:18px;font-weight:900;color:var(--blue);padding:0 2px;}

/* COEFFICIENT CONTROL */
.coef-ctrl{display:flex;align-items:center;gap:2px;}
.coef-val{
  min-width:28px;height:28px;background:#fff;
  border-radius:6px;border:1.5px solid #C7D9FF;
  font-family:'Space Mono',monospace;font-size:16px;font-weight:700;
  color:var(--blue);display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.coef-val.ok{border-color:var(--grn);color:var(--grn);background:var(--grn-lt);}
.coef-val.wrong{border-color:var(--red);color:var(--red);background:#FFF0F0;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.coef-btn{
  width:22px;height:22px;border-radius:5px;border:1.5px solid #DDE4F0;
  background:#F8FAFF;color:var(--muted);font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;
  font-family:inherit;transition:all .15s;
}
.coef-btn:active{background:var(--blue);color:#fff;border-color:var(--blue);}

/* ATOM COUNT TABLE */
.atom-tbl{width:100%;border-collapse:collapse;font-size:11.5px;}
.atom-tbl th{background:var(--blue);color:#fff;padding:5px 8px;
  text-align:center;font-weight:700;}
.atom-tbl td{padding:5px 8px;text-align:center;border:1px solid var(--border);}
.atom-tbl tr:nth-child(even) td{background:#F8FAFF;}
td.match{color:var(--grn);font-weight:700;}
td.mismatch{color:var(--red);font-weight:700;}

/* BUTTONS */
.btn-row{display:flex;gap:8px;}
.btn{flex:1;padding:10px;border-radius:12px;border:none;
  font-size:clamp(12px,2vw,14px);font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .15s;}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--grn);color:#fff;box-shadow:0 3px 10px rgba(22,163,74,.35);}
.btn.ghost{background:#F1F5F9;color:var(--muted);}
.btn.ghost:hover{background:var(--border);}

/* RESULT MSG */
.result-msg{
  border-radius:10px;padding:10px 12px;font-size:12px;
  font-weight:700;line-height:1.6;border:1.5px solid transparent;
  transition:all .3s;
}
.result-msg.idle{background:#F8FAFF;color:var(--muted);border-color:var(--border);}
.result-msg.ok{background:var(--grn-lt);color:var(--grn);border-color:#86EFAC;}
.result-msg.warn{background:var(--ora-lt);color:var(--ora);border-color:#FDBA74;}

/* MASS ROW */
.mass-row{display:flex;gap:6px;}
.mass-box{flex:1;border-radius:8px;padding:7px 10px;text-align:center;border:1.5px solid;}
.mass-box .ml{font-size:9px;font-weight:700;color:var(--muted);margin-bottom:2px;}
.mass-box .mv{font-family:'Space Mono',monospace;font-size:clamp(13px,2.5vw,18px);font-weight:700;}

/* CONFETTI */
.cf{position:fixed;pointer-events:none;z-index:9999;border-radius:2px;
  animation:cffall 1.8s ease-out forwards;}
@keyframes cffall{from{opacity:1;transform:translateY(0) rotate(0);}to{opacity:0;transform:translateY(95vh) rotate(720deg);}}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div style="font-size:22px">&#x2697;&#xFE0F;</div>
  <div>
    <h1 id="hdr-title">앙금 생성 반응 가상 실험실</h1>
    <small>미래엔 중학교 3학년 과학 26~27쪽</small>
  </div>
  <div class="rx-tabs">
    <button class="rx-tab on" onclick="selectRxn(0)">&#129514; 앙금 생성</button>
    <button class="rx-tab"   onclick="selectRxn(1)">&#129511; 기체 발생</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT: LAB + PARTICLE -->
  <div id="lab-panel">
    <div class="lab-top">
      <span style="font-size:16px">&#x2697;&#xFE0F;</span>
      <h2 id="lab-title">탄산나트륨 수용액 + 염화칼슘 수용액 반응 관찰</h2>
    </div>

    <!-- BEAKERS + SCALE -->
    <div id="beaker-zone">
      <!-- Beaker A -->
      <div class="bk-wrap" id="bk-a" onclick="doMix()">
        <svg id="svg-a" width="64" height="90" viewBox="0 0 64 90" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="5" width="52" height="78" rx="5" fill="rgba(200,225,255,.18)" stroke="#90CAF9" stroke-width="2.5"/>
          <rect id="liq-a" x="8" y="36" width="48" height="46" rx="3" fill="#AED6F1" opacity=".85"/>
          <rect x="6" y="5" width="52" height="6" rx="3" fill="rgba(200,225,255,.25)" stroke="#90CAF9" stroke-width="1.5"/>
        </svg>
        <div class="bk-label" id="lbl-a">Na&#x2082;CO&#x2083;(aq)<br>탄산나트륨</div>
        <div style="font-size:9px;color:var(--blue);font-weight:700" id="tap-hint-a">탭해서 섞기 &#x1F4A7;</div>
      </div>

      <!-- MIX BUTTON -->
      <div id="mix-arrow">
        <button id="mix-btn" onclick="doMix()">&#x21C4;</button>
        <div id="mix-lbl" class="scale-lbl">용액 섞기</div>
      </div>

      <!-- Beaker B -->
      <div class="bk-wrap disabled" id="bk-b">
        <svg id="svg-b" width="64" height="90" viewBox="0 0 64 90" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="5" width="52" height="78" rx="5" fill="rgba(255,240,200,.18)" stroke="#FFCC80" stroke-width="2.5"/>
          <rect id="liq-b" x="8" y="36" width="48" height="46" rx="3" fill="#FAD7A0" opacity=".85"/>
          <rect x="6" y="5" width="52" height="6" rx="3" fill="rgba(255,240,200,.25)" stroke="#FFCC80" stroke-width="1.5"/>
        </svg>
        <div class="bk-label" id="lbl-b">CaCl&#x2082;(aq)<br>염화칼슘</div>
      </div>

      <!-- SCALE -->
      <div id="scale-wrap">
        <div class="scale-lbl">&#x2696;&#xFE0F; 전자저울</div>
        <div class="scale-screen" id="scale-val">100.0 g</div>
        <div class="scale-beam" id="scale-beam"></div>
        <div class="scale-post"></div>
        <div class="scale-base"></div>
      </div>
    </div>

    <!-- CANVAS -->
    <div id="canvas-wrap">
      <canvas id="pcanvas"></canvas>
      <div class="canvas-msg" id="canvas-msg">각 이온이 자기 용액 안에서 움직이고 있습니다</div>
      <div class="phase-badge sep" id="phase-badge">혼합 전</div>
    </div>

    <!-- LEGEND -->
    <div id="legend"></div>
  </div>

  <!-- RIGHT TOP: EQUATION -->
  <div id="eq-panel">
    <div class="panel-title">&#x270F;&#xFE0F; 화학반응식 계수를 완성해 볼까요?</div>
    <div style="font-size:10px;color:var(--muted)">(빈칸은 1을 의미합니다)</div>
    <div class="eq-row" id="eq-row"></div>
    <!-- ATOM TABLE -->
    <table class="atom-tbl" id="atom-tbl">
      <thead><tr id="atom-hdr"></tr></thead>
      <tbody id="atom-body"></tbody>
    </table>
    <div class="btn-row">
      <button class="btn ghost" onclick="resetCoefs()">&#x21BA; 다시 하기</button>
      <button class="btn primary" onclick="checkAnswer()">정답 확인</button>
    </div>
  </div>

  <!-- RIGHT BOTTOM: RESULT -->
  <div id="result-panel">
    <div class="panel-title">&#x1F4CA; 질량 변화</div>
    <div class="mass-row" id="mass-row"></div>
    <div class="result-msg idle" id="result-msg">용액을 섞고 계수를 맞춰보세요!</div>
  </div>

</div><!-- /main -->

<script>
/* ══════════════════════════════════════════════
   REACTION DEFINITIONS
══════════════════════════════════════════════ */
var RXNS = [
  {
    title: '앙금 생성 반응 가상 실험실',
    labTitle: '탄산나트륨 수용액 + 염화칼슘 수용액 반응 관찰',
    bkAColor:'#AED6F1', bkBColor:'#FAD7A0',
    lblA:'Na\u2082CO\u2083(aq)\n탄산나트륨', lblB:'CaCl\u2082(aq)\n염화칼슘',
    mixedColor:'rgba(220,220,250,.75)',
    pptColor:'rgba(241,245,249,.95)',
    massB:100.0, massA:100.0,
    particles:[
      {label:'Na\u207a',  type:'Na',   side:'A', n:4, r:14, bg:'#FDE68A',stroke:'#F59E0B',tx:'#78350F'},
      {label:'CO\u2083\u00b2\u207b',type:'CO3', side:'A', n:2, r:19, bg:'#93C5FD',stroke:'#3B82F6',tx:'#1E3A8A'},
      {label:'Ca\u00b2\u207a',type:'Ca',  side:'B', n:2, r:18, bg:'#6EE7B7',stroke:'#059669',tx:'#064E3B'},
      {label:'Cl\u207b',  type:'Cl',   side:'B', n:4, r:14, bg:'#DDD6FE',stroke:'#7C3AED',tx:'#4C1D95'},
    ],
    mergeType:function(a,b){ return {label:'CaCO\u2083\u2193',type:'PPT',r:22,bg:'#F1F5F9',stroke:'#94A3B8',tx:'#475569',gravity:true}; },
    mergeA:'CO3', mergeB:'Ca',
    legend:[
      {dot:'#FDE68A',stroke:'#F59E0B',label:'Na\u207a 나트륨 이온'},
      {dot:'#93C5FD',stroke:'#3B82F6',label:'CO\u2083\u00b2\u207b 탄산 이온'},
      {dot:'#6EE7B7',stroke:'#059669',label:'Ca\u00b2\u207a 칼슘 이온'},
      {dot:'#DDD6FE',stroke:'#7C3AED',label:'Cl\u207b 염화 이온'},
      {dot:'#F1F5F9',stroke:'#94A3B8',label:'CaCO\u2083\u2193 앙금'},
    ],
    coefMols:[
      {formula:'Na\u2082CO\u2083',state:'',side:'r',atoms:{Na:2,C:1,O:3}},
      {formula:'CaCl\u2082',     state:'',side:'r',atoms:{Ca:1,Cl:2}},
      {formula:'CaCO\u2083',     state:'\u2193',side:'p',atoms:{Ca:1,C:1,O:3}},
      {formula:'NaCl',           state:'',side:'p',atoms:{Na:1,Cl:1}},
    ],
    answerCoefs:[1,1,1,2],
    atomElems:['Na','Ca','C','O','Cl'],
    massLabel:'반응 전후 질량 (뚜껑 닫음)',
    massOk:true,
    massComment:'앙금이 생성되어도 닫힌 계에서는 질량이 보존됩니다!',
  },
  {
    title: '기체 발생 반응 가상 실험실',
    labTitle: '탄산수소나트륨 + 식초(아세트산) 반응 관찰',
    bkAColor:'#BBF7D0', bkBColor:'#FEF08A',
    lblA:'NaHCO\u2083\n탄산수소나트륨', lblB:'CH\u2083COOH\n식초(아세트산)',
    mixedColor:'rgba(252,243,207,.8)',
    massB:150.0, massA:150.0,
    particles:[
      {label:'NaHCO\u2083',type:'NaHCO3',side:'A',n:3,r:19,bg:'#BBF7D0',stroke:'#22C55E',tx:'#14532D'},
      {label:'CH\u2083COOH',type:'AcOH',side:'B',n:3,r:18,bg:'#FEF08A',stroke:'#EAB308',tx:'#713F12'},
    ],
    mergeType:function(a,b){return {label:'CO\u2082\u2191',type:'GAS',r:13,bg:'rgba(226,232,240,.9)',stroke:'#94A3B8',tx:'#475569',gravity:false,rise:true};},
    mergeA:'NaHCO3', mergeB:'AcOH',
    spawnExtra:function(mx,my,list){

      list.push({x:mx+_rv(10),y:my+_rv(10),vx:_rv(.7),vy:_rv(.7),r:13,bg:'#BAE6FD',stroke:'#0EA5E9',tx:'#0C4A6E',label:'H\u2082O',type:'H2O',side:'any',state:'free',partner:null,gravity:false});

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
var RI=0, mixed=false, phase='sep';
var PTCLS=[], RAF=null;
var coefs=[1,1,1,1];

/* ══════════════════════════════════════════════
   PARTICLE HELPERS
══════════════════════════════════════════════ */
function _rnd(a,b){return a+Math.random()*(b-a);}
function _rv(s){return(Math.random()-.5)*2*s;}

function lighten(hex,a){
  if(hex.charAt(0)!=='#')return hex;
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.min(255,r+a)+','+Math.min(255,g+a)+','+Math.min(255,b+a)+')';
}

function drawAtom(ctx,p){
  if(p.state==='dead')return;
  ctx.save();
  if(p.type==='PPT'||p.type==='GAS'){ctx.shadowColor=p.stroke;ctx.shadowBlur=9;}
  var grd=ctx.createRadialGradient(p.x-p.r*.3,p.y-p.r*.35,p.r*.08,p.x,p.y,p.r);
  grd.addColorStop(0,lighten(p.bg,50));
  grd.addColorStop(1,p.bg);
  ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
  ctx.fillStyle=grd;ctx.fill();
  ctx.strokeStyle=p.stroke;ctx.lineWidth=1.8;ctx.stroke();
  ctx.restore();
  var fs=Math.max(7,Math.round(p.r*(p.label.length>4?.52:.68)));
  ctx.font='bold '+fs+'px monospace';
  ctx.fillStyle=p.tx;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.label,p.x,p.y);
}

function initParticles(){
  var cv=document.getElementById('pcanvas');
  if(!cv)return;
  cv.width=cv.offsetWidth||300; cv.height=cv.offsetHeight||200;
  var W=cv.width,H=cv.height;
  PTCLS=[];
  var rxn=RXNS[RI];
  rxn.particles.forEach(function(pd){
    for(var i=0;i<pd.n;i++){
      var xRange=pd.side==='A'?[W*.07,W*.43]:[W*.57,W*.93];
      PTCLS.push({
        x:_rnd(xRange[0],xRange[1]),y:_rnd(H*.12,H*.85),
        vx:_rv(1.3),vy:_rv(1.3),
        r:pd.r,bg:pd.bg,stroke:pd.stroke,tx:pd.tx,
        label:pd.label,type:pd.type,side:pd.side,
        state:'free',partner:null,gravity:false
      });
    }
  });
  setPhase('sep');
  if(RAF)cancelAnimationFrame(RAF);
  animLoop();
}

function updateParticle(p,W,H){
  if(p.state==='dead')return;
  // Seeking partner
  if(p.state==='seek'&&p.partner&&p.partner.state==='seek'){
    var dx=p.partner.x-p.x,dy=p.partner.y-p.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<p.r+p.partner.r+2){
      doMerge(p,p.partner,W,H);return;
    }
    var spd=2.4;
    p.vx+=dx/dist*.22;p.vy+=dy/dist*.22;
    var s=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(s>spd){p.vx=p.vx/s*spd;p.vy=p.vy/s*spd;}
  }
  if(p.gravity){p.vy+=.07;if(p.vy>2.6)p.vy=2.6;}
  if(p.rise){p.vy-=.04;if(p.vy<-2.8)p.vy=-2.8;}
  p.x+=p.vx;p.y+=p.vy;
  // Walls
  if(phase==='sep'&&p.side==='A'){
    if(p.x-p.r<0){p.x=p.r;p.vx=Math.abs(p.vx);}
    if(p.x+p.r>W/2-1){p.x=W/2-1-p.r;p.vx=-Math.abs(p.vx);}
  } else if(phase==='sep'&&p.side==='B'){
    if(p.x-p.r<W/2+1){p.x=W/2+1+p.r;p.vx=Math.abs(p.vx);}
    if(p.x+p.r>W){p.x=W-p.r;p.vx=-Math.abs(p.vx);}
  } else {
    if(p.x-p.r<0){p.x=p.r;p.vx=Math.abs(p.vx);}
    if(p.x+p.r>W){p.x=W-p.r;p.vx=-Math.abs(p.vx);}
  }
  if(p.type==='PPT'){
    if(p.y+p.r>H-4){p.y=H-4-p.r;p.vy=0;p.vx*=.88;}
    if(p.y-p.r<18){p.y=18+p.r;p.vy=Math.abs(p.vy);}
  } else if(p.rise){
    if(p.y-p.r<4){p.y=4+p.r;p.vy=Math.abs(p.vy)*.15;}
    if(p.y+p.r>H){p.y=H-p.r;p.vy=-Math.abs(p.vy);}
  } else {
    if(p.y-p.r<18){p.y=18+p.r;p.vy=Math.abs(p.vy);}
    if(p.y+p.r>H-4){p.y=H-4-p.r;p.vy=-Math.abs(p.vy);}
  }
  if(Math.random()<.007&&p.state==='free'){
    p.vx+=_rv(.35);p.vy+=_rv(.35);
    var ms=1.7,s2=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(s2>ms){p.vx=p.vx/s2*ms;p.vy=p.vy/s2*ms;}
  }
}

function doMerge(a,b,W,H){
  var mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
  a.state='dead';b.state='dead';
  var rxn=RXNS[RI];
  var nw=rxn.mergeType(a,b);
  nw.x=mx;nw.y=my;nw.vx=_rv(.3);
  nw.vy=nw.gravity?Math.abs(_rv(.2))+.1:(nw.rise?-1.5-Math.random()*.5:_rv(.4));
  nw.side='any';nw.state=nw.gravity?'settle':'free';nw.partner=null;
  PTCLS.push(nw);
  if(rxn.spawnExtra)rxn.spawnExtra(mx,my,PTCLS);
}

function animLoop(){
  var cv=document.getElementById('pcanvas');
  if(!cv){RAF=null;return;}
  var ctx=cv.getContext('2d');
  var W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);

  // Background zones (sep phase)
  if(phase==='sep'){
    ctx.fillStyle='rgba(173,216,240,.12)';ctx.fillRect(0,0,W/2,H);
    ctx.fillStyle='rgba(255,220,130,.12)';ctx.fillRect(W/2,0,W/2,H);
    ctx.strokeStyle='rgba(150,150,150,.3)';ctx.setLineDash([5,5]);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
    // Zone labels
    ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillStyle='rgba(30,90,200,.4)';ctx.fillText(RI===0?'Na\u2082CO\u2083':'NaHCO\u2083',W/4,13);
    ctx.fillStyle='rgba(200,100,0,.4)'; ctx.fillText(RI===0?'CaCl\u2082':'CH\u2083COOH',W*3/4,13);
  }

  // Update + draw
  PTCLS.forEach(function(p){updateParticle(p,W,H);});
  PTCLS.forEach(function(p){drawAtom(ctx,p);});

  // Bottom labels
  var hasPPT=PTCLS.some(function(p){return p.type==='PPT'&&p.state!=='dead';});
  var hasGAS=PTCLS.some(function(p){return p.type==='GAS'&&p.state!=='dead';});
  if(hasPPT){ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillStyle='rgba(71,85,105,.75)';ctx.fillText('\u2193 CaCO\u2083 흰색 앙금 침전',W/2,H-4);}
  if(hasGAS){ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillStyle='rgba(71,85,105,.75)';ctx.fillText('CO\u2082\u2191 기체 발생!',W/2,12);}

  // Check react done
  if(phase==='react'&&!PTCLS.some(function(p){return p.state==='seek';})){
    setPhase('done');
    updateScale();
  }
  RAF=requestAnimationFrame(animLoop);
}

function pairReact(){
  var rxn=RXNS[RI];
  var as=PTCLS.filter(function(p){return p.type===rxn.mergeA&&p.state==='free';});
  var bs=PTCLS.filter(function(p){return p.type===rxn.mergeB&&p.state==='free';});
  for(var i=0;i<Math.min(as.length,bs.length);i++){
    as[i].partner=bs[i];bs[i].partner=as[i];
    as[i].state='seek';bs[i].state='seek';
  }
}

function setPhase(ph){
  phase=ph;
  var badge=document.getElementById('phase-badge');
  var msg=document.getElementById('canvas-msg');
  var texts={sep:'혼합 전',mix:'혼합 중...',react:'\ud83d\udd34 반응 중!',done:'\u2705 반응 완료'};
  var msgs={
    sep:'각 이온이 자기 용액 안에서 움직이고 있습니다',
    mix:'두 용액이 섞이고 있습니다...',
    react:'이온들이 만나 새로운 물질을 만들고 있어요!',
    done:RI===0?'Ca\u00b2\u207a + CO\u2083\u00b2\u207b \u2192 CaCO\u2083\u2193 반응 완료! 앙금이 침전됩니다.':'NaHCO\u2083 + CH\u2083COOH \u2192 CO\u2082\u2191 기체 발생!'
  };
  if(badge){badge.textContent=texts[ph]||ph;badge.className='phase-badge '+ph;}
  if(msg)msg.textContent=msgs[ph]||'';
}

/* ══════════════════════════════════════════════
   MIX ACTION
══════════════════════════════════════════════ */
function doMix(){
  if(mixed)return;
  mixed=true;
  // Update beaker visuals
  var rxn=RXNS[RI];
  var liqB=document.getElementById('liq-b');
  if(liqB){liqB.setAttribute('fill',rxn.mixedColor||'rgba(215,215,245,.75)');liqB.setAttribute('y','20');liqB.setAttribute('height','62');}
  var bkA=document.getElementById('bk-a');
  if(bkA){bkA.style.opacity='.28';bkA.classList.remove('tap');bkA.onclick=null;}
  var tapHintA=document.getElementById('tap-hint-a');
  if(tapHintA)tapHintA.style.display='none';
  var mixBtn=document.getElementById('mix-btn');
  if(mixBtn){mixBtn.disabled=true;mixBtn.style.background='#CBD5E1';}
  var mixLbl=document.getElementById('mix-lbl');
  if(mixLbl)mixLbl.textContent='혼합 완료';
  // Particle: unlock barriers, start mixing
  setPhase('mix');
  PTCLS.forEach(function(p){p.side='any';});
  setTimeout(function(){
    if(phase!=='mix')return;
    setPhase('react');
    pairReact();
  },1800);
  // Update result
  document.getElementById('result-msg').textContent='반응 중... 계수를 맞춰보세요!';
  document.getElementById('result-msg').className='result-msg idle';
  updateAtomTable();
}

/* ══════════════════════════════════════════════
   SCALE
══════════════════════════════════════════════ */
function updateScale(){
  var rxn=RXNS[RI];
  var sc=document.getElementById('scale-val');
  var beam=document.getElementById('scale-beam');
  if(!sc)return;
  if(!mixed){
    sc.textContent=rxn.massB.toFixed(1)+' g';
    sc.style.color='#4ADE80';
    if(beam)beam.className='scale-beam';
    return;
  }
  // After reaction
  sc.textContent=rxn.massA.toFixed(1)+' g';
  sc.style.color=rxn.massOk?'#4ADE80':'#FCA5A5';
  if(beam)beam.className='scale-beam'+(rxn.massOk?' ok':'');
}

/* ══════════════════════════════════════════════
   EQUATION BUILDER
══════════════════════════════════════════════ */
function buildEqRow(){
  var rxn=RXNS[RI];
  var row=document.getElementById('eq-row');
  row.innerHTML='';
  coefs=rxn.answerCoefs.map(function(){return 1;});
  var seps=['+','\u2192','+','+','+'];
  var si=0,reactDone=false;
  rxn.coefMols.forEach(function(m,i){
    if(m.side==='p'&&!reactDone){
      reactDone=true;
      var arr=document.createElement('span');arr.className='eq-arr';arr.textContent='\u2192';row.appendChild(arr);
    } else if(i>0&&m.side==='r'){
      var pl=document.createElement('span');pl.className='eq-plus';pl.textContent='+';row.appendChild(pl);
    } else if(m.side==='p'&&i>0&&reactDone){
      var pl2=document.createElement('span');pl2.className='eq-plus';pl2.textContent='+';row.appendChild(pl2);
    }
    var unit=document.createElement('div');unit.className='eq-unit';
    // coef ctrl
    var ctrl=document.createElement('div');ctrl.className='coef-ctrl';
    var vm=document.createElement('div');vm.className='coef-val';vm.id='cv'+i;vm.textContent='1';
    var bm=document.createElement('button');bm.className='coef-btn';bm.textContent='-';
    bm.onclick=(function(idx){return function(){adjC(idx,-1);};})(i);
    var bp=document.createElement('button');bp.className='coef-btn';bp.textContent='+';
    bp.onclick=(function(idx){return function(){adjC(idx,1);};})(i);
    ctrl.appendChild(bm);ctrl.appendChild(vm);ctrl.appendChild(bp);
    unit.appendChild(ctrl);
    // formula
    var fml=document.createElement('span');fml.className='eq-mol';
    fml.innerHTML=m.formula+(m.state?'<span class="eq-state '+(m.state==='\u2193'?'ppt':'gas')+'">'+m.state+'</span>':'');
    unit.appendChild(fml);
    row.appendChild(unit);
  });
}

function adjC(idx,delta){
  var rxn=RXNS[RI];
  var nv=(coefs[idx]||1)+delta;
  if(nv<1||nv>9)return;
  coefs[idx]=nv;
  var cv=document.getElementById('cv'+idx);
  if(cv){cv.textContent=nv;cv.className='coef-val';}
  updateAtomTable();
}

function resetCoefs(){
  var rxn=RXNS[RI];
  coefs=rxn.answerCoefs.map(function(){return 1;});
  rxn.coefMols.forEach(function(_,i){
    var cv=document.getElementById('cv'+i);
    if(cv){cv.textContent='1';cv.className='coef-val';}
  });
  document.getElementById('result-msg').textContent='\ub2e4\uc2dc \uc2dc\ub3c4\ud574\ubcf4\uc138\uc694!';
  document.getElementById('result-msg').className='result-msg idle';
  updateAtomTable();
}

/* ══════════════════════════════════════════════
   ATOM COUNT TABLE
══════════════════════════════════════════════ */
function buildAtomTable(){
  var rxn=RXNS[RI];
  var hdr=document.getElementById('atom-hdr');
  hdr.innerHTML='<th>\uad6c\ubd84</th>'+rxn.atomElems.map(function(e){
    return '<th>'+e+'</th>';
  }).join('');
  updateAtomTable();
}

function updateAtomTable(){
  var rxn=RXNS[RI];
  var els=rxn.atomElems;
  var before={},after={};
  els.forEach(function(e){before[e]=0;after[e]=0;});
  rxn.coefMols.forEach(function(m,i){
    var c=coefs[i]||1;
    var tgt=m.side==='r'?before:after;
    els.forEach(function(e){tgt[e]+=(m.atoms[e]||0)*c;});
  });
  var body=document.getElementById('atom-body');
  body.innerHTML=[
    {lbl:'\ubc18\uc751 \uc804 (\ubc18\uc751\ubb3c)',data:before},
    {lbl:'\ubc18\uc751 \ud6c4 (\uc0dd\uc131\ubb3c)',data:after}
  ].map(function(row){
    return '<tr><td><b>'+row.lbl+'</b></td>'
      +els.map(function(e){
        var val=row.data[e];
        var match=before[e]===after[e];
        return '<td class="'+(match?'match':'mismatch')+'">'+val+'</td>';
      }).join('')+'</tr>';
  }).join('');
}

/* ══════════════════════════════════════════════
   ANSWER CHECK
══════════════════════════════════════════════ */
function checkAnswer(){
  var rxn=RXNS[RI];
  var els=rxn.atomElems;
  var before={},after={};
  els.forEach(function(e){before[e]=0;after[e]=0;});
  rxn.coefMols.forEach(function(m,i){
    var c=coefs[i]||1;
    var tgt=m.side==='r'?before:after;
    els.forEach(function(e){tgt[e]+=(m.atoms[e]||0)*c;});
  });
  var balanced=els.every(function(e){return before[e]===after[e];});
  var coefOk=rxn.answerCoefs.every(function(a,i){return (coefs[i]||1)===a;});
  var msg=document.getElementById('result-msg');
  // Color correct coef boxes
  rxn.coefMols.forEach(function(_,i){
    var cv=document.getElementById('cv'+i);
    if(cv)cv.className='coef-val '+(coefs[i]===rxn.answerCoefs[i]?'ok':'wrong');
  });
  if(balanced&&coefOk){
    msg.className='result-msg ok';
    msg.innerHTML='\ud83c\udf89 \uc815\ub2f5! \ud654\ud559\ubc18\uc751\uc2dd \uc644\uc131!<br>'+rxn.massComment;
    buildMassRow();
    confetti();
  } else if(balanced){
    msg.className='result-msg ok';
    msg.textContent='\u2705 \uc6d0\uc790 \uc218 \uc77c\uce58! \ub354 \uac04\ub2e8\ud55c \uc815\uc218 \uacc4\uc218\ub85c \ub2e4\uc2dc \ud655\uc778\ud574\ubcf4\uc138\uc694.';
    buildMassRow();
  } else {
    var bad=els.filter(function(e){return before[e]!==after[e];})
      .map(function(e){return e+': \ubc18\uc751\ubb3c '+before[e]+' \u2260 \uc0dd\uc131\ubb3c '+after[e];});
    msg.className='result-msg warn';
    msg.innerHTML='\u26a0\ufe0f \uc544\uc9c1 \ubd88\uade0\ud615\ud569\ub2c8\ub2e4<br>'+bad.join(' / ');
  }
}

   MASS ROW
══════════════════════════════════════════════ */
function buildMassRow(){

      +'<div class="mass-box" style="border-color:var(--teal);background:var(--teal-lt)"><div class="ml">\uc5f0\uc0b0</div><div class="mv" style="color:var(--teal)">0.0 g</div></div>';
  } else {
    row.innerHTML=
      '<div class="mass-box" style="border-color:var(--blue);background:var(--blue-lt)"><div class="ml">\ubc18\uc751 \uc804 (\ub274\uacc9\ub2eb\uc74c)</div><div class="mv" style="color:var(--blue)">'+rxn.massB.toFixed(1)+' g</div></div>'
      +'<div class="mass-box" style="border-color:var(--grn);background:var(--grn-lt)"><div class="ml">\ub274\uacc9 \ub2eb\ud6c4</div><div class="mv" style="color:var(--grn)">'+rxn.massA.toFixed(1)+' g</div></div>'
      +'<div class="mass-box" style="border-color:var(--red);background:#FFF0F0"><div class="ml">\ub274\uacc9 \uc5f4\ub9b4 \ud6c4</div><div class="mv" style="color:var(--red)">147.2 g</div></div>';

/* ══════════════════════════════════════════════
   SELECT RXN
══════════════════════════════════════════════ */
function selectRxn(i){
  RI=i;mixed=false;phase='sep';coefs=RXNS[i].answerCoefs.map(function(){return 1;});
  document.querySelectorAll('.rx-tab').forEach(function(t,j){t.classList.toggle('on',j===i);});
  document.getElementById('hdr-title').textContent=RXNS[i].title;
  document.getElementById('lab-title').textContent=RXNS[i].labTitle;
  // Beaker colors
  var rxn=RXNS[i];
  var liqA=document.getElementById('liq-a');if(liqA){liqA.setAttribute('fill',rxn.bkAColor);liqA.setAttribute('y','36');liqA.setAttribute('height','46');}
  var liqB=document.getElementById('liq-b');if(liqB){liqB.setAttribute('fill',rxn.bkBColor);liqB.setAttribute('y','36');liqB.setAttribute('height','46');}
  // Labels
  var lbla=document.getElementById('lbl-a');if(lbla){var p=rxn.lblA.split('\n');lbla.innerHTML=p[0]+'<br>'+p[1];}
  var lblb=document.getElementById('lbl-b');if(lblb){var p2=rxn.lblB.split('\n');lblb.innerHTML=p2[0]+'<br>'+p2[1];}
  // Reset beaker A
  var bkA=document.getElementById('bk-a');
  if(bkA){bkA.style.opacity='1';bkA.classList.add('tap');bkA.onclick=function(){doMix();};}
  var tapHintA=document.getElementById('tap-hint-a');if(tapHintA)tapHintA.style.display='';
  // Restore svg B border
  var svgB=document.getElementById('svg-b');
  if(svgB){svgB.querySelector('rect').setAttribute('stroke',i===0?'#FFCC80':'#FDE68A');}
  var bkB=document.getElementById('bk-b');if(bkB)bkB.classList.add('disabled');
  // Mix btn
  var mb=document.getElementById('mix-btn');if(mb){mb.disabled=false;mb.style.background='var(--teal)';}
  var ml=document.getElementById('mix-lbl');if(ml)ml.textContent='용액 섞기';
  // Scale
  updateScale();
  // Mass row
  document.getElementById('mass-row').innerHTML='';
  document.getElementById('result-msg').textContent='\uc6a9\uc561\uc744 \uc154\uace0 \uacc4\uc218\ub97c \ub9de\ucdb0\ubcf4\uc138\uc694!';
  document.getElementById('result-msg').className='result-msg idle';
  // Build UI
  buildEqRow();buildAtomTable();buildLegend();
  // Particles
  if(RAF){cancelAnimationFrame(RAF);RAF=null;}
  setTimeout(function(){initParticles();},80);
}

/* ══════════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════════ */
var lastBang=0;
function confetti(){
  var now=Date.now();if(now-lastBang<2000)return;lastBang=now;
  var cols=['#FDE68A','#93C5FD','#6EE7B7','#DDD6FE','#BBF7D0','#FED7AA'];
  for(var i=0;i<60;i++){
    var e=document.createElement('div');e.className='cf';var s=5+Math.random()*10;
    e.style.cssText='left:'+(Math.random()*100)+'vw;top:-10px;background:'+cols[Math.floor(Math.random()*cols.length)]+';width:'+s+'px;height:'+s+'px;border-radius:'+(Math.random()>.5?'50%':'3px')+';animation-delay:'+(Math.random()*.8).toFixed(1)+'s;';
    document.body.appendChild(e);
    setTimeout((function(el){return function(){el.remove();};})(e),2800);
  }
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
window.onload=function(){selectRxn(0);};
window.onresize=function(){
  var cv=document.getElementById('pcanvas');
  if(!cv)return;
  cv.width=cv.offsetWidth||300;cv.height=cv.offsetHeight||200;
  // Reinit particles on resize
  if(!mixed)initParticles();
};
</script>
